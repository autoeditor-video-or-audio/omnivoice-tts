apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: omnivoice-tts-references
  labels:
    app: omnivoice-tts
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: omnivoice-tts-hf-cache
  labels:
    app: omnivoice-tts
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
