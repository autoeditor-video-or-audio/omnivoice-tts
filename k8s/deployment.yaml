apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnivoice-tts
  labels:
    app: omnivoice-tts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omnivoice-tts
  template:
    metadata:
      labels:
        app: omnivoice-tts
    spec:
      containers:
        - name: omnivoice-tts-server
          image: ghcr.io/autoeditor-video-or-audio/omnivoice-tts:latest-gpu-flash
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8005
              protocol: TCP
          envFrom:
            - configMapRef:
                name: omnivoice-tts-config
          volumeMounts:
            - name: references
              mountPath: /app/reference_audio
            - name: hf-cache
              mountPath: /root/.cache/huggingface
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 240
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            limits:
              cpu: "4"
              memory: 12Gi
              nvidia.com/gpu: 1
            requests:
              cpu: "1"
              memory: 4Gi
              nvidia.com/gpu: 1
      volumes:
        - name: references
          persistentVolumeClaim:
            claimName: omnivoice-tts-references
        - name: hf-cache
          persistentVolumeClaim:
            claimName: omnivoice-tts-hf-cache
