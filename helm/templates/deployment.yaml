apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: omnivoice-tts-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8005
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
          volumeMounts:
            {{- if .Values.persistence.references.enabled }}
            - name: references
              mountPath: /app/reference_audio
            {{- end }}
            {{- if .Values.persistence.hf.enabled }}
            - name: hf-cache
              mountPath: /root/.cache/huggingface
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 240
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.persistence.references.enabled }}
        - name: references
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-references
        {{- end }}
        {{- if .Values.persistence.hf.enabled }}
        - name: hf-cache
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-hf-cache
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
